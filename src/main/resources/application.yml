server:
  port: ${DEV_PORT:8080}

spring:
  application:
    name: buddy
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  web:
    throw-exception-if-no-handler-found: true
    resources:
      add-mappings: true
      static-locations: classpath:/static/
  config:
    import: optional:file:.env[.properties]

aws:
  s3:
    bucket-name: ${AWS_S3_BUCKET_NAME:local-bucket}
    region: ${AWS_S3_REGION:ap-southeast-2}
    access-key: ${AWS_ACCESS_KEY_ID:test-access-key}
    secret-key: ${AWS_SECRET_ACCESS_KEY:test-secret-key}
    endpoint: ${AWS_S3_ENDPOINT:}
    public-base-url: ${AWS_S3_PUBLIC_BASE_URL:}
    default-avatar-url: ${AWS_S3_DEFAULT_AVATAR_URL:https://example.com/avatars/default.png}
    allowed-image-types: ${AWS_S3_ALLOWED_IMAGE_TYPES:image/jpeg,image/jpg,image/png,image/webp}
    allowed-video-types: ${AWS_S3_ALLOWED_VIDEO_TYPES:video/mp4,video/webp}

resilience4j:
  circuitbreaker:
    instances:
      moodle:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 20s
        permittedNumberOfCallsInHalfOpenState: 3
      moodleAssignments:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 3
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 2
        # Only actual external-service failures should trip the circuit
        recordExceptions:
          - com.uit.buddy.exception.client.ExternalClientException
          - org.springframework.web.client.RestClientException
