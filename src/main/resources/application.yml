server:
  port: ${DEV_PORT:8080}

spring:
  application:
    name: buddy
  profiles:
    active: ${SPRING_PROFILES_ACTIVE}
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: true
      static-locations: classpath:/static/
  config:
    import: optional:file:.env[.properties]
