<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UIT Buddy - Mã xác thực OTP</title>
  </head>
  <body>
    <div
      style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto"
    >
      <h2 style="color: #2563eb">UIT Buddy - Xác thực tài khoản</h2>
      <p>Xin chào,</p>
      <p>Mã OTP của bạn là:</p>
      <div
        style="
          background-color: #f3f4f6;
          padding: 20px;
          text-align: center;
          border-radius: 8px;
          margin: 20px 0;
        "
      >
        <span
          style="
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 8px;
            color: #1f2937;
          "
          >{{OTP}}</span
        >
      </div>
      <p>Mã này sẽ hết hạn sau <strong>5 phút</strong>.</p>
      <p style="color: #6b7280; font-size: 14px">
        Nếu bạn không yêu cầu mã này, vui lòng bỏ qua email này.
      </p>
      <hr style="border: none; border-top: 1px solid #e5e7eb; margin: 20px 0" />
      <p style="color: #9ca3af; font-size: 12px">
        © 2026 UIT Buddy. All rights reserved.
      </p>
    </div>
  </body>
</html>
