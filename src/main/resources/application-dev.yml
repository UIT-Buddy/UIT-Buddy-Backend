server:
  port: ${DEV_PORT:8080}

spring:
  datasource:
    url: ${DEV_DATABASE_URL}
    username: ${DEV_DATABASE_USERNAME}
    password: ${DEV_DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      connection-timeout: 5000

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    connect-retries: 10
    connect-retries-interval: 3

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false

  data:
    redis:
      host: ${DEV_REDIS_HOST:localhost}
      port: ${DEV_REDIS_PORT:6379}

  mail:
    host: ${DEV_MAIL_HOST}
    port: ${DEV_MAIL_PORT}
    username: ${DEV_MAIL_USERNAME}
    password: ${DEV_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  threads:
    virtual:
      enabled: true

  servlet:
    multipart:
      enabled: true
      max-file-size: ${MAX_FILE_SIZE}
      max-request-size: ${MAX_REQUEST_SIZE}

app:
  default-locale: ${APP_DEFAULT_LOCALE:vi}
  default-timezone: ${APP_DEFAULT_TIMEZONE:Asia/Ho_Chi_Minh}

  uit:
    api-url: ${UIT_API_URL:https://courses.uit.edu.vn}
    moodle-server-path: ${UIT_MOODLE_SERVER_PATH:/webservice/rest/server.php}
    rest-format: ${UIT_REST_FORMAT:json}

  cometchat:
    api-url: ${COMETCHAT_API_URL:https://api-us.cometchat.io/v3}
    api-key: ${COMETCHAT_API_KEY}
    app-id: ${COMETCHAT_APP_ID}

  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:900000}
    refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}
    refresh-token-remember-me-expiration: ${JWT_REFRESH_TOKEN_REMEMBER_ME_EXPIRATION:2592000000}

  encryption:
    secret: ${ENCRYPTION_SECRET}
    algorithm: ${APP_ENCRYPTION_ALGORITHM}

  otp:
    length: ${OTP_LENGTH:6}
    expiration-seconds: ${OTP_EXPIRATION_SECONDS:300}
    max-attempts: ${OTP_MAX_ATTEMPTS:3}
    resend-cooldown-seconds: ${OTP_RESEND_COOLDOWN_SECONDS:60}

  pending-account:
    expiration-seconds: ${PENDING_ACCOUNT_EXPIRATION_SECONDS:300}

  firebase:
    config-path: ${APP_CONFIG_PATH}
    app-name: ${APP_NAME}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}
  default-avatar-url: ${CLOUDINARY_DEFAULT_AVATAR_URL}
  max-image-size: ${CLOUDINARY_MAX_IMAGE_SIZE}
  max-video-size: ${CLOUDINARY_MAX_VIDEO_SIZE}
  allowed-image-types: ${CLOUDINARY_ALLOWED_IMAGE_TYPES}
  allowed-video-types: ${CLOUDINARY_ALLOWED_VIDEO_TYPES}
  avatar-size: ${CLOUDINARY_AVATAR_SIZE}
  thumbnail-size: ${CLOUDINARY_THUMBNAIL_SIZE}
  post-image-width: ${CLOUDINARY_POST_IMAGE_WIDTH}
  post-image-height: ${CLOUDINARY_POST_IMAGE_HEIGHT}
post:
  limit-upload-images: ${POST_LIMIT_UPLOAD_IMAGES}
  limit-upload-videos: ${POST_LIMIT_UPLOAD_VIDEOS}
thread:
  core-thread-pool-size: ${CORE_THREAD_POOL_SIZE}
  max-thread-pool-size: ${MAX_THREAD_POOL_SIZE}
  thread-queue-capacity: ${THREAD_QUEUE_CAPACITY}
scalar:
  path: ${SCALAR_PATH:/docs}
  url: ${SCALAR_URL:/v3/api-docs}
  enabled: ${SCALAR_ENABLED:true}

# Logging
logging:
  level:
    root: INFO
    com.uit.buddy: DEBUG
    org.flywaydb: DEBUG
