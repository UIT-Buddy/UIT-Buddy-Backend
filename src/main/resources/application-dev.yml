server:
  port: ${DEV_PORT:8080}

spring:
  datasource:
    url: ${DEV_DATABASE_URL:jdbc:postgresql://localhost:5433/buddy_db}
    username: ${DEV_DATABASE_USERNAME:postgres}
    password: ${DEV_DATABASE_PASSWORD:postgres123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      connection-timeout: 5000
      max-lifetime: 50000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${DEV_REDIS_HOST:localhost}
      port: ${DEV_REDIS_PORT:6379}
      timeout: 60000

  mail:
    host: ${DEV_MAIL_HOST}
    port: ${DEV_MAIL_PORT:587}
    username: ${DEV_MAIL_USERNAME}
    password: ${DEV_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  threads:
    virtual:
      enabled: true

app:
  default-locale: ${APP_DEFAULT_LOCALE:vi}
  default-timezone: ${APP_DEFAULT_TIMEZONE:Asia/Ho_Chi_Minh}
  jwt:
    secret: ${JWT_SECRET_KEY}
    token:
      expires-in: ${JWT_ACCESS_EXPIRES_IN}
    refresh-token:
      expires-in: ${JWT_REFRESH_EXPIRES_IN}
      expires-in-with-rememberme: ${JWT_REFRESH_EXPIRES_IN_WITH_REMEMBERME}
  otp:
    expiration-minutes: ${OTP_EXPIRATION_MINUTES:5}

scalar:
  path: ${SCALAR_PATH:/docs}
  url: ${SCALAR_URL:/v3/api-docs}
  enabled: ${SCALAR_ENABLED:true}

# Logging
logging:
  level:
    root: INFO
    com.uit.buddy: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
