server:
  port: 8080

spring:
  datasource:
    url: ${DEV_DATABASE_URL:jdbc:postgresql://localhost:5433/buddy_db}
    username: ${DEV_POSTGRES_USER:postgres}
    password: ${DEV_POSTGRES_PASSWORD:postgres123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      connection-timeout: 30000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 60000

  flyway:
    enabled: false

# Logging
logging:
  level:
    root: INFO
    com.uit.buddy: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
