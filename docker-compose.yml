# Docker Compose Configuration
services:
  postgres:
    image: postgres:17-alpine
    container_name: buddy-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-buddy_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
    ports:
      - "5433:5433"
    command: -p 5433
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    container_name: buddy-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  backend:
    build: .
    container_name: buddy-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      # Server
      DEV_PORT: 8080
      # Database
      DEV_DATABASE_URL: jdbc:postgresql://postgres:5433/buddy_db
      DEV_DATABASE_USERNAME: postgres
      DEV_DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      # Redis
      DEV_REDIS_HOST: redis
      DEV_REDIS_PORT: 6379
      # JWT
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-900000}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-604800000}
      JWT_REFRESH_EXPIRES_IN_WITH_REMEMBERME: ${JWT_REFRESH_EXPIRES_IN_WITH_REMEMBERME:-2592000000}
      # OTP
      OTP_LENGTH: ${OTP_LENGTH:-6}
      OTP_EXPIRATION_SECONDS: ${OTP_EXPIRATION_SECONDS:-300}
      OTP_MAX_ATTEMPTS: ${OTP_MAX_ATTEMPTS:-5}
      OTP_RESEND_COOLDOWN_SECONDS: ${OTP_RESEND_COOLDOWN_SECONDS:-120}
      # Temp Token
      TEMP_TOKEN_EXPIRATION_SECONDS: ${TEMP_TOKEN_EXPIRATION_SECONDS:-600}
      # Mail
      DEV_MAIL_HOST: ${DEV_MAIL_HOST}
      DEV_MAIL_PORT: ${DEV_MAIL_PORT:-587}
      DEV_MAIL_USERNAME: ${DEV_MAIL_USERNAME}
      DEV_MAIL_PASSWORD: ${DEV_MAIL_PASSWORD}
      # App
      APP_DEFAULT_LOCALE: ${APP_DEFAULT_LOCALE:-vi}
      APP_DEFAULT_TIMEZONE: ${APP_DEFAULT_TIMEZONE:-Asia/Ho_Chi_Minh}
      # Scalar
      SCALAR_PATH: ${SCALAR_PATH:-/docs}
      SCALAR_URL: ${SCALAR_URL:-/v3/api-docs}
      SCALAR_ENABLED: ${SCALAR_ENABLED:-true}
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  redis_data:
