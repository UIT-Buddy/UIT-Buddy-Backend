services:
  postgres:
    image: postgres:17-alpine
    container_name: buddy-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-buddy_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
    ports:
      - "5433:5433"
    command: -p 5433
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    container_name: buddy-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  backend:
    build: .
    container_name: buddy-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      # Server
      DEV_PORT: 8080
      # Database
      DEV_DATABASE_URL: jdbc:postgresql://postgres:5433/buddy_db
      DEV_DATABASE_USERNAME: postgres
      DEV_DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      # Redis
      DEV_REDIS_HOST: redis
      DEV_REDIS_PORT: 6379
      # JWT
      DEV_JWT_SECRET: ${DEV_JWT_SECRET}
      DEV_JWT_EXPIRATION: 86400000
      DEV_JWT_REFRESH_EXPIRATION: 604800000
      # Mail
      DEV_MAIL_HOST: ${DEV_MAIL_HOST}
      DEV_MAIL_PORT: ${DEV_MAIL_PORT:-587}
      DEV_MAIL_USERNAME: ${DEV_MAIL_USERNAME}
      DEV_MAIL_PASSWORD: ${DEV_MAIL_PASSWORD}
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  redis_data:
