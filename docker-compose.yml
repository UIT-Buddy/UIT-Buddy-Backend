# Docker Compose Configuration
services:
  postgres:
    image: docker.io/library/postgres:17-alpine
    container_name: buddy-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - ${HOST_POSTGRES_PORT}:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: docker.io/library/redis:8-alpine
    container_name: buddy-redis
    ports:
      - ${HOST_REDIS_PORT}:6379
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  backend:
    build: .
    container_name: buddy-backend
    ports:
      - ${HOST_SERVER_PORT}:8080
    env_file:
      - .env
    volumes:
      - ./uit-buddy-firebase-adminsdk-fbsvc-e3e18ce04a.json:/app/uit-buddy-firebase-adminsdk-fbsvc-e3e18ce04a.json:ro
    environment:
      - DEV_DATABASE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      - DEV_REDIS_HOST=redis
      - DEV_REDIS_PORT=6379
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  redis_data:
