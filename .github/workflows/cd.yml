name: UIT Buddy Backend CD flow

on:
  workflow_run:
    workflows: ["UIT Buddy Backend CI flow"]
    types:
      - completed
    branches:
      - main

concurrency:
  group: production-deployment
  cancel-in-progress: false

jobs:
  deploy-to-production:
    name: Deploy UIT Buddy Backend to Production Server
    runs-on: self-hosted
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout GitOps Manifests
        uses: actions/checkout@v4
        with:
          repository: UIT-Buddy/UIT-Buddy-GitOps-Manifests
          path: gitops-manifests

      - name: Create backend.env from secret
        env:
          BACKEND_ENV_CONTENT: ${{ secrets.BACKEND_ENV_FILE }}
        run: |
          printf "%s" "$BACKEND_ENV_CONTENT" > gitops-manifests/backend.env

      - name: Create Firebase Admin SDK JSON from secret
        env:
          FIREBASE_JSON_CONTENT: ${{ secrets.FIREBASE_ADMINSDK_JSON }}
        run: |
          printf "%s" "$FIREBASE_JSON_CONTENT" > gitops-manifests/uit-buddy-firebase-adminsdk-fbsvc-e3e18ce04a.json

      - name: Deploy Locally on Self-Hosted
        env:
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -e
          cd gitops-manifests
          IMAGE_TAG=$IMAGE_TAG sudo make up
